name: Deploy to GitHub Pages

on:
  # Deploie a chaque push sur main
  push:
    branches: [main]
  # Permet un declenchement manuel depuis l'onglet Actions
  workflow_dispatch:

# Permissions requises pour publier sur GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Un seul deploiement concurrent
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
